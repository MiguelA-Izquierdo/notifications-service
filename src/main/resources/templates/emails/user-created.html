<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="#{email.user-created.subject(${data.name})}">Bienvenido</title>
  <th:block th:replace="~{fragments/email-base :: styles}"></th:block>
</head>
<body>
  <th:block th:replace="~{fragments/email-base :: header}"></th:block>

  <div class="content">
    <h1 th:text="#{email.user-created.greeting(${data.name})}"></h1>
    <p th:text="#{email.user-created.body1}"></p>
    <p th:text="#{email.user-created.body2}"></p>
    <p th:text="#{email.user-created.body3}"></p>
  </div>

  <th:block th:replace="~{fragments/email-base :: footer}"></th:block>
</body>
</html>
