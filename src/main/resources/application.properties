spring.application.name=app_notifications_service
spring.main.web-application-type=none

# Health (JMX only — no HTTP server)
management.endpoints.jmx.exposure.include=health

# RabbitMQ connection
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.virtual-host=/

# Messaging topology
messaging.exchange.user=userExchange
messaging.exchange.dlx=user.dlx
messaging.exchange.retry=user.retry.exchange
messaging.queue.userCreated=userCreatedQueue
messaging.queue.userUpdated=userUpdatedQueue
messaging.queue.userDeleted=userDeletedQueue
messaging.queue.userCreated.dlq=userCreatedQueue.dlq
messaging.queue.userUpdated.dlq=userUpdatedQueue.dlq
messaging.queue.userDeleted.dlq=userDeletedQueue.dlq
messaging.routing.key.userCreated=user.created
messaging.routing.key.userUpdated=user.updated
messaging.routing.key.userDeleted=user.deleted

# Email SMTP
spring.mail.host=${GMAIL_HOST}
spring.mail.port=${GMAIL_PORT:587}
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Localisation
notification.default-locale=es

# RabbitMQ listener tuning
spring.rabbitmq.listener.simple.prefetch=10
spring.rabbitmq.listener.simple.concurrency=3
spring.rabbitmq.listener.simple.max-concurrency=5

# Circuit breaker (SMTP / email sending)
resilience4j.circuitbreaker.instances.emailService.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.emailService.sliding-window-size=10
resilience4j.circuitbreaker.instances.emailService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.emailService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.emailService.wait-duration-in-open-state=60s
resilience4j.circuitbreaker.instances.emailService.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.emailService.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.emailService.record-exceptions[0]=com.app.notificationService.notifications.domain.exceptions.EmailSendingException

# Idempotency store
# max-size: maximum number of live entries kept in memory. Each entry costs ~400 bytes,
# so 100 000 entries ≈ 40 MB. Raise this value before the WARN log "evicting valid entry
# before TTL expiry" appears under sustained load.
messaging.idempotency.ttl-hours=24
messaging.idempotency.max-size=100000
messaging.idempotency.cleanup-interval-ms=3600000